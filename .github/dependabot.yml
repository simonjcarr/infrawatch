version: 2

updates:
  # --- GitHub Actions -------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "area:ci"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # --- Container base images -----------------------------------------------
  - package-ecosystem: "docker"
    directories:
      - "/apps/web"
      - "/apps/docs"
      - "/apps/ingest"
      - "/apps/licence-purchase"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "area:docker"
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns:
          - "*"
    ignore:
      # Base-image majors break the Dockerfile contract (e.g. node 25
      # dropped corepack, alpine major bumps shuffle apk packages).
      # Do these manually.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "golang"
        update-types: ["version-update:semver-major"]
      - dependency-name: "alpine"
        update-types: ["version-update:semver-major"]

  # --- Node / pnpm workspaces ----------------------------------------------
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/web"
      - "/apps/docs"
      - "/apps/licence-purchase"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "area:npm"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major framework / tooling bumps are never silent — do them by hand.
      # Rationale for each entry is in the commit that added it.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "drizzle-orm"
        update-types: ["version-update:semver-major"]
      - dependency-name: "drizzle-kit"
        update-types: ["version-update:semver-major"]
      - dependency-name: "better-auth"
        update-types: ["version-update:semver-major"]
      # ESLint 10 breaks eslint-plugin-react until the plugin ships an
      # ESLint 10 compatible release; the bump currently fails the build.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      # @types/node majors track the Node runtime major — only bump in
      # lockstep with the engines field.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # Stripe majors include breaking API version bumps.
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]

  # --- Go modules -----------------------------------------------------------
  - package-ecosystem: "gomod"
    directories:
      - "/agent"
      - "/apps/ingest"
      - "/proto/gen/go"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "area:go"
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "google.golang.org/grpc"
        update-types: ["version-update:semver-major"]
      - dependency-name: "google.golang.org/protobuf"
        update-types: ["version-update:semver-major"]
