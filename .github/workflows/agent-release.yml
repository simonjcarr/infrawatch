name: Release

# Runs on every push to main.
#
# Step 1 — release-please examines conventional commits since the last
#           agent/v* tag and opens (or updates) a Release PR showing the
#           computed next version and a generated CHANGELOG.
#
# Step 2 — when that Release PR is merged, release-please creates the tag
#           and GitHub Release, then the build matrix kicks in and uploads
#           the compiled binaries.
#
# Commit conventions that drive the version bump:
#   fix(agent): …        → patch  (0.1.0 → 0.1.1)
#   feat(agent): …       → minor  (0.1.0 → 0.2.0)
#   feat(agent)!: …      → major  (0.1.0 → 1.0.0)
#   BREAKING CHANGE: …   → major  (in commit body/footer)
#
# Commits touching files under agent/ are also picked up even without a
# scope, but scoping with (agent) keeps the changelog clean in a monorepo.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Release PR management ────────────────────────────────────────────────
  release-please:
    name: Create or update release PR
    runs-on: self-hosted
    outputs:
      release_created:     ${{ steps.release.outputs['agent--release_created'] }}
      tag_name:            ${{ steps.release.outputs['agent--tag_name'] }}
      web_release_created: ${{ steps.release.outputs['apps/web--release_created'] }}
      web_tag_name:        ${{ steps.release.outputs['apps/web--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Binary build matrix ──────────────────────────────────────────────────
  # Only runs when the release PR is merged (i.e. a real release was created).
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: self-hosted

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, asset_suffix: linux-amd64   }
          - { goos: linux,   goarch: arm64, asset_suffix: linux-arm64   }
          - { goos: darwin,  goarch: amd64, asset_suffix: darwin-amd64  }
          - { goos: darwin,  goarch: arm64, asset_suffix: darwin-arm64  }
          - { goos: windows, goarch: amd64, asset_suffix: windows-amd64, exe_suffix: .exe }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: |
            agent/go.sum
            go.work.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#agent/}"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/infrawatch-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}" \
            ./agent/cmd/agent

      - name: Generate SBOM for binary
        uses: anchore/sbom-action@v0
        with:
          file: dist/infrawatch-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}
          format: spdx-json
          output-file: dist/infrawatch-agent-${{ matrix.asset_suffix }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Checksum and upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          sha256sum "infrawatch-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}" \
            > "infrawatch-agent-${{ matrix.asset_suffix }}.sha256"
          sha256sum "infrawatch-agent-${{ matrix.asset_suffix }}.spdx.json" \
            >> "infrawatch-agent-${{ matrix.asset_suffix }}.sha256"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "infrawatch-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}" \
            "infrawatch-agent-${{ matrix.asset_suffix }}.sha256" \
            "infrawatch-agent-${{ matrix.asset_suffix }}.spdx.json"

  # ── Customer bundle for web releases ─────────────────────────────────────
  # Runs in the same workflow run as release-please so the GITHUB_TOKEN
  # anti-recursion rule does not apply (a separate workflow listening on
  # `push: tags` would never fire because release-please uses GITHUB_TOKEN).
  bundle-web:
    name: Customer bundle (web)
    needs: release-please
    if: needs.release-please.outputs.web_release_created == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.web_tag_name }}

      - name: Stage bundle files
        run: |
          set -euo pipefail
          TAG="${{ needs.release-please.outputs.web_tag_name }}"
          VERSION="${TAG#web/}"
          mkdir -p dist/infrawatch
          cp docker-compose.single.yml dist/infrawatch/docker-compose.yml
          cp start.sh                  dist/infrawatch/start.sh
          cp .env.example              dist/infrawatch/.env.example
          cp deploy/customer-bundle/README.md dist/infrawatch/README.md
          echo "$VERSION" > dist/infrawatch/VERSION
          chmod +x dist/infrawatch/start.sh
          # The bundled compose file is named docker-compose.yml so plain
          # `docker compose` works without -f. Strip the explicit -f from
          # the bundled start.sh to match.
          sed -i 's/-f docker-compose.single.yml //g' dist/infrawatch/start.sh
          (cd dist && zip -r "../infrawatch-single-${VERSION}.zip" infrawatch)
          cp "infrawatch-single-${VERSION}.zip" infrawatch-single.zip

      - name: Generate SBOM for web bundle source
        uses: anchore/sbom-action@v0
        with:
          path: apps/web
          format: spdx-json
          output-file: infrawatch-web.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.release-please.outputs.web_tag_name }}"
          VERSION="${TAG#web/}"
          gh release upload "$TAG" \
            "infrawatch-single-${VERSION}.zip" \
            "infrawatch-single.zip" \
            "infrawatch-web.spdx.json" \
            --clobber
