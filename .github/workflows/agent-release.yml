name: Release

# Runs on every push to main.
#
# Step 1 — release-please examines conventional commits since the last
#           agent/v* tag and opens (or updates) a Release PR showing the
#           computed next version and a generated CHANGELOG.
#
# Step 2 — when that Release PR is merged, release-please creates the tag
#           and GitHub Release, then the build matrix kicks in and uploads
#           the compiled binaries.
#
# Commit conventions that drive the version bump:
#   fix(agent): …        → patch  (0.1.0 → 0.1.1)
#   feat(agent): …       → minor  (0.1.0 → 0.2.0)
#   feat(agent)!: …      → major  (0.1.0 → 1.0.0)
#   BREAKING CHANGE: …   → major  (in commit body/footer)
#
# Commits touching files under agent/ are also picked up even without a
# scope, but scoping with (agent) keeps the changelog clean in a monorepo.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Release PR management ────────────────────────────────────────────────
  release-please:
    name: Create or update release PR
    runs-on: self-hosted
    outputs:
      release_created:     ${{ steps.release.outputs['agent--release_created'] }}
      tag_name:            ${{ steps.release.outputs['agent--tag_name'] }}
      web_release_created: ${{ steps.release.outputs['apps/web--release_created'] }}
      web_tag_name:        ${{ steps.release.outputs['apps/web--tag_name'] }}
    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Binary build matrix ──────────────────────────────────────────────────
  # Only runs when the release PR is merged (i.e. a real release was created).
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: self-hosted

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, asset_suffix: linux-amd64   }
          - { goos: linux,   goarch: arm64, asset_suffix: linux-arm64   }
          - { goos: darwin,  goarch: amd64, asset_suffix: darwin-amd64  }
          - { goos: darwin,  goarch: arm64, asset_suffix: darwin-arm64  }
          - { goos: windows, goarch: amd64, asset_suffix: windows-amd64, exe_suffix: .exe }

    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: |
            agent/go.sum
            go.work.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#agent/}"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/ct-ops-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}" \
            ./agent/cmd/agent

      - name: Generate SBOM for binary
        uses: anchore/sbom-action@v0
        with:
          file: dist/ct-ops-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}
          format: spdx-json
          output-file: dist/ct-ops-agent-${{ matrix.asset_suffix }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        run: |
          cd dist
          sha256sum "ct-ops-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}" \
            > "ct-ops-agent-${{ matrix.asset_suffix }}.sha256"
          sha256sum "ct-ops-agent-${{ matrix.asset_suffix }}.spdx.json" \
            >> "ct-ops-agent-${{ matrix.asset_suffix }}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/ct-ops-agent-${{ matrix.asset_suffix }}${{ matrix.exe_suffix }}
            dist/ct-ops-agent-${{ matrix.asset_suffix }}.sha256
            dist/ct-ops-agent-${{ matrix.asset_suffix }}.spdx.json

  # ── Customer bundle for web releases ─────────────────────────────────────
  # Runs in the same workflow run as release-please so the GITHUB_TOKEN
  # anti-recursion rule does not apply (a separate workflow listening on
  # `push: tags` would never fire because release-please uses GITHUB_TOKEN).
  bundle-web:
    name: Customer bundle (web)
    needs: release-please
    if: needs.release-please.outputs.web_release_created == 'true'
    runs-on: self-hosted
    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.web_tag_name }}

      - name: Stage bundle files
        run: |
          set -euo pipefail
          TAG="${{ needs.release-please.outputs.web_tag_name }}"
          VERSION="${TAG#web/}"
          mkdir -p dist/ct-ops
          cp docker-compose.single.yml        dist/ct-ops/docker-compose.yml
          cp .env.example                     dist/ct-ops/.env.example
          cp deploy/customer-bundle/README.md dist/ct-ops/README.md
          echo "$VERSION" > dist/ct-ops/VERSION

          # The customer start.sh is generated here rather than checked into
          # the repo so the only source of truth lives next to the workflow
          # that ships it. Re-generated on every release — never edit a copy
          # in a customer install; change it here and cut a new release.
          cat > dist/ct-ops/start.sh <<'CUSTOMER_START_SH'
          #!/usr/bin/env bash
          set -euo pipefail

          # =============================================================================
          # ct-ops — Customer Start Script (generated by CI on every release)
          # =============================================================================

          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"

          DOCS_URL="https://carrtech-dev.github.io/ct-ops/"
          SUPPORT_URL="https://github.com/carrtech-dev/ct-ops/issues"

          REQUIRED_VARS=(BETTER_AUTH_URL BETTER_AUTH_TRUSTED_ORIGINS BETTER_AUTH_SECRET POSTGRES_PASSWORD)
          OPTIONAL_VARS=(AGENT_DOWNLOAD_BASE_URL INGEST_WS_URL CT_OPS_LOADTEST_ADMIN_KEY WEB_IMAGE INGEST_IMAGE)

          show_help() {
            cat <<HELP
          ct-ops — single-host installer

          Commands:
            ./start.sh             Start (or update) the stack
            ./start.sh --logs      Tail logs from all containers (Ctrl-C to stop)
            ./start.sh --down      Stop the stack (named volumes are preserved)
            ./start.sh --version   Show bundle version, app version and licence tier
            ./start.sh --help      Show this message

          Air-gap installs:
            ./build-offline-installer.sh  Bundle pulled images for offline use
                                          (run on an internet-connected host)

          Documentation: ${DOCS_URL}
          Support:       ${SUPPORT_URL}
          HELP
          }

          require_docker() {
            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: 'docker' is not installed or not on PATH." >&2
              echo "Install Docker Engine 24+: https://docs.docker.com/engine/install/" >&2
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: 'docker compose' plugin not found. Upgrade to a release that bundles Compose." >&2
              exit 1
            fi
          }

          show_version() {
            if [ -f "VERSION" ]; then
              echo "Bundle version:   $(cat VERSION)"
            else
              echo "Bundle version:   unknown (no VERSION file in $(pwd))"
            fi

            require_docker
            if ! docker compose ps --status=running --services 2>/dev/null | grep -q '^web$'; then
              echo "App version:      not running — start the stack with ./start.sh"
              echo "Licence tier:     unknown (containers not running)"
              return 0
            fi

            APP_VERSION=$(docker compose exec -T web sh -c 'cat /app/.release-please-manifest.json 2>/dev/null' \
              | sed -n 's/.*"apps\/web"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)
            echo "App version:      ${APP_VERSION:-unknown}"

            : "${POSTGRES_USER:=ctops}"
            : "${POSTGRES_DB:=ctops}"
            TIERS=$(docker compose exec -T db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -At \
              -c "SELECT name || ': ' || licence_tier FROM organisations WHERE deleted_at IS NULL ORDER BY created_at;" 2>/dev/null || true)
            if [ -z "$TIERS" ]; then
              echo "Licence tier:     unknown (no organisation configured yet)"
            else
              echo "Licence tier:"
              while IFS= read -r line; do printf '  %s\n' "$line"; done <<< "$TIERS"
            fi
          }

          check_env() {
            if [ ! -f ".env" ]; then
              if [ -f ".env.example" ]; then
                cp .env.example .env
                chmod 600 .env
                echo ""
                echo "Created .env from .env.example."
                echo "Edit .env to set your URLs, then re-run ./start.sh."
                echo ""
                exit 0
              fi
              echo "ERROR: no .env and no .env.example found in $(pwd)" >&2
              exit 1
            fi

            set -a
            # shellcheck disable=SC1091
            source .env
            set +a

            # Generate BETTER_AUTH_SECRET on first run if blank — anyone with this
            # value can forge sessions, so it must never be empty in production.
            if [ -z "${BETTER_AUTH_SECRET:-}" ]; then
              command -v openssl >/dev/null 2>&1 || { echo "ERROR: 'openssl' is required to generate BETTER_AUTH_SECRET." >&2; exit 1; }
              GENERATED_SECRET=$(openssl rand -hex 32)
              if grep -q '^BETTER_AUTH_SECRET=' .env; then
                awk -v s="$GENERATED_SECRET" '/^BETTER_AUTH_SECRET=/ {print "BETTER_AUTH_SECRET=" s; next} {print}' .env > .env.tmp && mv .env.tmp .env
              else
                echo "BETTER_AUTH_SECRET=$GENERATED_SECRET" >> .env
              fi
              chmod 600 .env
              export BETTER_AUTH_SECRET="$GENERATED_SECRET"
              echo "Generated BETTER_AUTH_SECRET and wrote it to .env."
            fi

            if [ -z "${POSTGRES_PASSWORD:-}" ]; then
              command -v openssl >/dev/null 2>&1 || { echo "ERROR: 'openssl' is required to generate POSTGRES_PASSWORD." >&2; exit 1; }
              GENERATED_PG_PASS=$(openssl rand -hex 16)
              if grep -q '^POSTGRES_PASSWORD=' .env; then
                awk -v p="$GENERATED_PG_PASS" '/^POSTGRES_PASSWORD=/ {print "POSTGRES_PASSWORD=" p; next} {print}' .env > .env.tmp && mv .env.tmp .env
              else
                echo "POSTGRES_PASSWORD=$GENERATED_PG_PASS" >> .env
              fi
              chmod 600 .env
              export POSTGRES_PASSWORD="$GENERATED_PG_PASS"
              echo "Generated POSTGRES_PASSWORD and wrote it to .env."
            fi

            MISSING=()
            for v in "${REQUIRED_VARS[@]}"; do
              [ -z "${!v:-}" ] && MISSING+=("$v")
            done
            if [ ${#MISSING[@]} -gt 0 ]; then
              echo "ERROR: required variables are not set in .env:" >&2
              for v in "${MISSING[@]}"; do echo "  - $v" >&2; done
              echo "" >&2
              echo "Edit .env, then re-run ./start.sh. See ${DOCS_URL} for details." >&2
              exit 1
            fi

            for v in "${OPTIONAL_VARS[@]}"; do
              [ -z "${!v:-}" ] && echo "WARN: optional variable '$v' is not set — using built-in default."
            done
          }

          ensure_tls_certs() {
            CERT_DIR="$SCRIPT_DIR/deploy/dev-tls"
            if [ -f "$CERT_DIR/server.crt" ] && [ -f "$CERT_DIR/server.key" ]; then
              return 0
            fi
            command -v openssl >/dev/null 2>&1 || { echo "ERROR: 'openssl' is required to generate the ingest TLS certificate." >&2; exit 1; }
            echo "Generating ingest TLS certificate (dev-grade, 365-day expiry)..."
            mkdir -p "$CERT_DIR"
            if command -v ip >/dev/null 2>&1; then
              LOCAL_IPS=$(ip -4 addr show scope global 2>/dev/null | awk '/inet / {split($2,a,"/"); print "IP:" a[1]}' | tr '\n' ',' | sed 's/,$//')
            else
              LOCAL_IPS=$(ifconfig 2>/dev/null | awk '/inet / && !/127\.0\.0\.1/ {print "IP:" $2}' | tr '\n' ',' | sed 's/,$//')
            fi
            SAN="DNS:ingest,DNS:localhost,IP:127.0.0.1"
            [ -n "$LOCAL_IPS" ] && SAN="${SAN},${LOCAL_IPS}"
            openssl req -x509 -newkey rsa:4096 \
              -keyout "$CERT_DIR/server.key" \
              -out "$CERT_DIR/server.crt" \
              -sha256 -days 365 -nodes \
              -subj "/CN=ct-ops-ingest" \
              -addext "subjectAltName=${SAN}" 2>/dev/null
            echo "TLS certificate written to ${CERT_DIR} (SANs: ${SAN})."
          }

          # In an air-gap install the engineer has placed images.tar.gz next to
          # this script via build-offline-installer.sh. Detect that and load
          # the images locally instead of attempting a GHCR pull (which would
          # hang or fail with no internet route).
          load_or_pull_images() {
            if [ -f "images.tar.gz" ]; then
              echo "Loading bundled docker images (offline mode)..."
              if ! docker load -i images.tar.gz; then
                echo "ERROR: failed to load images from images.tar.gz" >&2
                echo "  - The archive may be corrupted; re-run build-offline-installer.sh" >&2
                echo "  - Verify free disk space with: df -h" >&2
                exit 1
              fi
              return 0
            fi
            echo "Pulling latest images from GHCR..."
            if ! docker compose pull db web ingest; then
              echo "" >&2
              echo "ERROR: failed to pull one or more images from GHCR." >&2
              echo "  - Check network access to ghcr.io" >&2
              echo "  - If you pinned WEB_IMAGE/INGEST_IMAGE in .env, verify the tag exists" >&2
              echo "  - For air-gapped installs, run ./build-offline-installer.sh on a" >&2
              echo "    connected host and ship the resulting *-airgap.zip to this host" >&2
              exit 1
            fi
          }

          start_stack() {
            require_docker
            check_env
            ensure_tls_certs
            load_or_pull_images

            docker compose down --remove-orphans >/dev/null 2>&1 || true

            echo "Starting ct-ops..."
            if ! docker compose up -d; then
              echo "" >&2
              echo "ERROR: 'docker compose up' failed." >&2
              echo "Recent logs (last 50 lines per service):" >&2
              docker compose logs --tail 50 || true
              echo "" >&2
              echo "Common causes:" >&2
              echo "  - Ports 3000, 8080, 9443 or 5432 already in use on this host" >&2
              echo "  - Insufficient disk space for the database volume" >&2
              echo "  - .env values that the web/ingest containers reject (check logs above)" >&2
              echo "" >&2
              echo "For more help, see ${DOCS_URL} or open a ticket at ${SUPPORT_URL}" >&2
              exit 1
            fi

            echo ""
            echo "ct-ops is starting. Open ${BETTER_AUTH_URL:-http://localhost:3000} in your browser."
            echo "Tail logs with:  ./start.sh --logs"
            echo "Stop with:       ./start.sh --down"
          }

          stop_stack() {
            require_docker
            echo "Stopping ct-ops..."
            docker compose down
            echo "Stopped. Data volumes are preserved — re-run ./start.sh to bring everything back up."
          }

          tail_logs() {
            require_docker
            exec docker compose logs -f --tail 100
          }

          if [ "$#" -eq 0 ]; then
            start_stack
            exit 0
          fi
          if [ "$#" -gt 1 ]; then
            echo "ERROR: only one option may be passed at a time." >&2
            show_help >&2
            exit 1
          fi
          case "$1" in
            --logs)        tail_logs ;;
            --down)        stop_stack ;;
            --version|-v)  show_version ;;
            --help|-h)     show_help ;;
            *)
              echo "ERROR: unknown option '$1'" >&2
              echo "" >&2
              show_help >&2
              exit 1
              ;;
          esac
          CUSTOMER_START_SH

          chmod +x dist/ct-ops/start.sh
          bash -n dist/ct-ops/start.sh

          # build-offline-installer.sh — also generated inline. Engineer runs
          # this on an internet-connected host to pull and bundle the docker
          # images, then ships the resulting *-airgap.zip to the disconnected
          # target host where start.sh detects images.tar.gz and skips the pull.
          cat > dist/ct-ops/build-offline-installer.sh <<'CUSTOMER_OFFLINE_SH'
          #!/usr/bin/env bash
          set -euo pipefail

          # =============================================================================
          # ct-ops — Build Offline Installer (generated by CI on every release)
          #
          # Run on an internet-connected host AFTER unzipping the standard ct-ops
          # release. Pulls every image referenced by docker-compose.yml, saves
          # them to images.tar.gz, and re-zips this directory as
          # ct-ops-single-{VERSION}-airgap.zip in the parent directory.
          # =============================================================================

          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"

          if ! command -v docker >/dev/null 2>&1; then
            echo "ERROR: 'docker' is not installed or not on PATH." >&2
            exit 1
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo "ERROR: 'docker compose' plugin not found." >&2
            exit 1
          fi
          if ! command -v zip >/dev/null 2>&1; then
            echo "ERROR: 'zip' is required to package the airgap bundle." >&2
            exit 1
          fi
          if [ ! -f docker-compose.yml ]; then
            echo "ERROR: docker-compose.yml not found in $(pwd)." >&2
            echo "Run this script from inside the unzipped ct-ops bundle." >&2
            exit 1
          fi

          VERSION=$(cat VERSION 2>/dev/null || echo "unknown")

          # `docker compose config --images` resolves image names without starting
          # any containers. Compose's variable substitution is strict, so we feed
          # placeholder values for the required-secret env vars purely to make the
          # config render — these are NEVER persisted to .env or used at runtime.
          export BETTER_AUTH_SECRET="${BETTER_AUTH_SECRET:-build-time-placeholder}"
          export POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-build-time-placeholder}"

          echo "Resolving image names from docker-compose.yml..."
          IMAGES=$(docker compose config --images 2>/dev/null | sort -u)
          if [ -z "$IMAGES" ]; then
            echo "ERROR: could not resolve any image names from docker-compose.yml" >&2
            exit 1
          fi
          echo "Images:"
          while IFS= read -r img; do printf '  %s\n' "$img"; done <<< "$IMAGES"

          echo "Pulling images from GHCR (this may take a while)..."
          while IFS= read -r img; do
            docker pull "$img"
          done <<< "$IMAGES"

          echo "Saving images to images.tar.gz..."
          # shellcheck disable=SC2086
          docker save $IMAGES | gzip > images.tar.gz
          echo "  $(du -h images.tar.gz | cut -f1) written."

          PARENT="$(dirname "$SCRIPT_DIR")"
          DIRNAME="$(basename "$SCRIPT_DIR")"
          OUT="$PARENT/ct-ops-single-${VERSION}-airgap.zip"
          echo "Re-zipping bundle as $OUT..."
          # Exclude operator secrets, runtime-generated TLS material, and any
          # previous airgap output that might be sitting alongside this one.
          (cd "$PARENT" && zip -r "$OUT" "$DIRNAME" \
            -x "$DIRNAME/.env" \
            -x "$DIRNAME/deploy/*" \
            -x "$DIRNAME/ct-ops-single-*-airgap.zip" >/dev/null)

          echo ""
          echo "Air-gap bundle ready: $OUT"
          echo "Transfer it to your air-gapped target host, unzip, and run ./start.sh"
          CUSTOMER_OFFLINE_SH

          chmod +x dist/ct-ops/build-offline-installer.sh
          bash -n dist/ct-ops/build-offline-installer.sh

          (cd dist && zip -r "../ct-ops-single-${VERSION}.zip" ct-ops)
          cp "ct-ops-single-${VERSION}.zip" ct-ops-single.zip

      - name: Generate SBOM for web bundle source
        uses: anchore/sbom-action@v0
        with:
          path: apps/web
          format: spdx-json
          output-file: ct-ops-web.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Resolve bundle filename
        id: bundle
        run: |
          set -euo pipefail
          TAG="${{ needs.release-please.outputs.web_tag_name }}"
          VERSION="${TAG#web/}"
          echo "versioned=ct-ops-single-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.web_tag_name }}
          files: |
            ${{ steps.bundle.outputs.versioned }}
            ct-ops-single.zip
            ct-ops-web.spdx.json
