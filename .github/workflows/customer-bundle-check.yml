name: Customer bundle check

on:
  pull_request:
    paths:
      - ".github/workflows/agent-release.yml"
      - ".github/workflows/customer-bundle-check.yml"
      - "deploy/customer-bundle/**"
      - "deploy/password-manager-release.json"
      - "deploy/scripts/validate-password-manager-release.py"
      - "deploy/scripts/test-install.sh"
      - "deploy/scripts/test-password-manager-nginx.sh"
      - "deploy/scripts/test-password-manager-startup.sh"
      - "deploy/scripts/test-start.sh"
      - "deploy/scripts/test-web-entrypoint.sh"
      - "deploy/scripts/test-upgrade.sh"
      - "deploy/scripts/test-support-data.sh"
      - "deploy/scripts/fetch-licence-public-key.sh"
      - "deploy/nginx/nginx.conf"
      - "docker-compose.single.yml"
      - "apps/web/entrypoint.sh"
      - ".env.example"
      - "install.sh"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage customer bundle
        run: |
          set -euo pipefail
          WEB_IMAGE_REF="ghcr.io/carrtech-dev/ct-ops/web@sha256:1111111111111111111111111111111111111111111111111111111111111111"
          INGEST_IMAGE_REF="ghcr.io/carrtech-dev/ct-ops/ingest@sha256:2222222222222222222222222222222222222222222222222222222222222222"
          python3 deploy/scripts/validate-password-manager-release.py deploy/password-manager-release.json
          PASSWORD_MANAGER_API_IMAGE_REF="$(python3 -c 'import json; print(json.load(open("deploy/password-manager-release.json", encoding="utf-8"))["digest_reference"])')"
          export WEB_IMAGE_REF INGEST_IMAGE_REF PASSWORD_MANAGER_API_IMAGE_REF
          mkdir -p dist/ct-ops/deploy/nginx
          cp docker-compose.single.yml dist/ct-ops/docker-compose.yml
          cp .env.example dist/ct-ops/.env.example
          cp deploy/customer-bundle/README.md dist/ct-ops/README.md
          cp deploy/password-manager-release.json dist/ct-ops/password-manager-release.json
          cp deploy/customer-bundle/start.sh dist/ct-ops/start.sh
          cp deploy/customer-bundle/backup.sh dist/ct-ops/backup.sh
          cp deploy/customer-bundle/build-offline-installer.sh dist/ct-ops/build-offline-installer.sh
          cp deploy/customer-bundle/refresh_licence_key dist/ct-ops/refresh_licence_key
          cp deploy/customer-bundle/upgrade.sh dist/ct-ops/upgrade.sh
          cp deploy/customer-bundle/generate_support_data dist/ct-ops/generate_support_data
          bash deploy/scripts/fetch-licence-public-key.sh dist/ct-ops/licence-keys/current.pem
          cp deploy/nginx/nginx.conf dist/ct-ops/deploy/nginx/nginx.conf
          echo "test" > dist/ct-ops/VERSION
          perl -0pi -e 's/\$\{WEB_IMAGE:-ghcr\.io\/carrtech-dev\/ct-ops\/web:latest\}/$ENV{WEB_IMAGE_REF}/g; s/\$\{INGEST_IMAGE:-ghcr\.io\/carrtech-dev\/ct-ops\/ingest:latest\}/$ENV{INGEST_IMAGE_REF}/g' dist/ct-ops/docker-compose.yml
          perl -0pi -e 's/^# WEB_IMAGE=.*$/WEB_IMAGE=$ENV{WEB_IMAGE_REF}/m; s/^# INGEST_IMAGE=.*$/INGEST_IMAGE=$ENV{INGEST_IMAGE_REF}/m; s/^# PASSWORD_MANAGER_API_IMAGE=.*$/PASSWORD_MANAGER_API_IMAGE=$ENV{PASSWORD_MANAGER_API_IMAGE_REF}/m' dist/ct-ops/.env.example
          chmod +x dist/ct-ops/start.sh dist/ct-ops/backup.sh dist/ct-ops/build-offline-installer.sh dist/ct-ops/refresh_licence_key dist/ct-ops/upgrade.sh dist/ct-ops/generate_support_data

      - name: Validate scripts and required files
        working-directory: dist/ct-ops
        run: |
          set -euo pipefail
          test -f docker-compose.yml
          test -f deploy/nginx/nginx.conf
          test -f .env.example
          test -f password-manager-release.json
          test -f licence-keys/current.pem
          grep -q '^PASSWORD_MANAGER_API_IMAGE=ghcr.io/carrtech-dev/ct-password-manager/api@sha256:' .env.example
          test -x backup.sh
          test -x refresh_licence_key
          test -x upgrade.sh
          test -x generate_support_data
          python3 ../../deploy/scripts/validate-password-manager-release.py password-manager-release.json
          bash -n start.sh
          bash -n backup.sh
          bash -n build-offline-installer.sh
          bash -n refresh_licence_key
          bash -n upgrade.sh
          bash -n generate_support_data

      - name: Validate installer script
        run: |
          set -euo pipefail
          bash -n install.sh
          bash deploy/scripts/test-install.sh
          bash deploy/scripts/test-password-manager-compose.sh
          bash deploy/scripts/test-password-manager-nginx.sh
          bash deploy/scripts/test-password-manager-startup.sh
          bash deploy/scripts/test-start.sh
          bash deploy/scripts/test-web-entrypoint.sh
          bash deploy/scripts/test-upgrade.sh
          bash deploy/scripts/test-support-data.sh

      - name: Render compose config
        working-directory: dist/ct-ops
        env:
          BETTER_AUTH_SECRET: build-time-placeholder
          POSTGRES_PASSWORD: build-time-placeholder
        run: |
          set -euo pipefail
          refs="$(docker compose config --images)"
          echo "$refs"
          grep -Eq '^ghcr\.io/carrtech-dev/ct-password-manager/api@sha256:[0-9a-f]{64}$' <<< "$refs"
          grep -Eq '^postgres:17-alpine@sha256:[0-9a-f]{64}$' <<< "$refs"
          while IFS= read -r ref; do
            case "$ref" in
              *@sha256:*) ;;
              *)
                echo "ERROR: unpinned image reference in bundled compose: $ref" >&2
                exit 1
                ;;
            esac
          done <<< "$refs"
