name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for showLastUpdateTime/Author

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.6.5'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --filter @infrawatch/docs --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @infrawatch/docs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/docs/build
          cname: ''  # set this to your custom domain if you have one, e.g. docs.infrawatch.io
