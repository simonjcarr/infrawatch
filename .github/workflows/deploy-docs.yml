name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for showLastUpdateTime/Author

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.6.5'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --filter @ct-ops/docs --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @ct-ops/docs build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/docs/.vuepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Clean up runner disk
        if: always()
        run: |
          set +e
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R "$(id -u):$(id -g)" /ws 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -delete 2>/dev/null || true
          rm -rf /tmp/digests 2>/dev/null || true
          docker buildx prune -f --filter "until=1h" 2>/dev/null || true
          docker system prune -f --filter "until=1h" 2>/dev/null || true
          exit 0
