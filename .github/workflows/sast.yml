name: SAST

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "47 5 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: gosec (${{ matrix.module }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: agent
            path: agent
          - module: ingest
            path: apps/ingest
    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: ${{ matrix.path }}/go.sum

      - name: Install gosec
        run: |
          curl -sSfL https://raw.githubusercontent.com/securego/gosec/master/install.sh \
            | sh -s -- -b "$HOME/.local/bin" v2.22.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run gosec
        run: gosec -no-fail -fmt sarif -out results.sarif ./...
        env:
          GOFLAGS: "-buildvcs=false"
        working-directory: ${{ matrix.path }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ matrix.path }}/results.sarif
          category: gosec-${{ matrix.module }}

      - name: Clean up runner disk
        if: always()
        run: |
          set +e
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R "$(id -u):$(id -g)" /ws 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -delete 2>/dev/null || true
          rm -rf /tmp/digests 2>/dev/null || true
          docker buildx prune -f --filter "until=1h" 2>/dev/null || true
          docker system prune -f --filter "until=1h" 2>/dev/null || true
          exit 0

  semgrep:
    name: semgrep
    runs-on: self-hosted
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/ci \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --exclude-rule javascript.node-crypto.security.gcm-no-tag-length.gcm-no-tag-length \
            --exclude-rule generic.nginx.security.request-host-used.request-host-used \
            --exclude-rule generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling \
            --sarif --output=semgrep.sarif
          # gcm-no-tag-length excluded above: lib/crypto/encrypt.ts uses explicit
          # tag.length !== TAG_LENGTH guards; setAuthTagLength is absent from this
          # Node.js version so the API-based fix is not available.
          #
          # request-host-used excluded: deploy/nginx/nginx.conf proxies $host to
          # the backend. Security-sensitive URLs (auth callbacks, cookie Secure/
          # Domain, trusted origins) derive from BETTER_AUTH_URL and
          # BETTER_AUTH_TRUSTED_ORIGINS env vars, not the Host header, so a
          # spoofed Host cannot forge sessions. The HTTPS redirect using $host
          # only redirects the attacker's own browser. Inline nosemgrep comments
          # document each occurrence.
          #
          # possible-nginx-h2c-smuggling excluded: the rule pattern-matches any
          # `proxy_set_header Connection` without reading the value. On non-WS
          # locations we explicitly clear Upgrade/Connection to "" (the rule's
          # own recommended mitigation), and on /ws/terminal/ Upgrade is forced
          # to a literal `websocket` with a map that only translates websocket
          # to Connection: upgrade — h2c and other values map to empty.

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Clean up runner disk
        if: always()
        # Runs inside the semgrep container — no docker access. Clear the
        # mounted workspace so the next run starts on a clean slate.
        run: |
          set +e
          find "$GITHUB_WORKSPACE" -mindepth 1 -delete 2>/dev/null || true
          exit 0

  trivy-fs:
    name: trivy (filesystem)
    runs-on: self-hosted
    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"
          skip-dirs: ".git,node_modules"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Clean up runner disk
        if: always()
        run: |
          set +e
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R "$(id -u):$(id -g)" /ws 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -delete 2>/dev/null || true
          rm -rf /tmp/digests 2>/dev/null || true
          # Trivy caches vulnerability DBs under ~/.cache/trivy — let it drop
          # entries older than 1h so we don't re-download on every job.
          docker buildx prune -f --filter "until=1h" 2>/dev/null || true
          docker system prune -f --filter "until=1h" 2>/dev/null || true
          exit 0

  crypto-lint:
    name: crypto-lint (no weak hashes / ciphers)
    runs-on: self-hosted
    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - uses: actions/checkout@v6

      - name: Deny weak hash algorithms (TS/JS)
        run: |
          # createHash('md5') or createHash('sha1') in TypeScript/JavaScript
          if grep -rn \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            --exclude-dir=node_modules --exclude-dir=".next" \
            -E "createHash\(['\"]md5['\"]|createHash\(['\"]sha1['\"]" \
            .; then
            echo "ERROR: Weak hash algorithm detected. Use SHA-256 or stronger."
            exit 1
          fi

      - name: Deny weak cipher modes (TS/JS)
        run: |
          # createCipheriv with ECB or CBC mode
          if grep -rn \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            --exclude-dir=node_modules --exclude-dir=".next" \
            -E "createCipheriv\(['\"][^'\"]*-(ecb|cbc)['\"]" \
            .; then
            echo "ERROR: ECB/CBC cipher modes must not be used. Prefer AES-256-GCM."
            exit 1
          fi

      - name: Deny weak hash algorithms (Go)
        run: |
          # crypto/md5 or crypto/sha1 imports (test files are excluded)
          if grep -rn \
            --include="*.go" --exclude="*_test.go" \
            -E '"crypto/md5"|"crypto/sha1"' \
            .; then
            echo "ERROR: Weak hash algorithm detected in Go code. Use crypto/sha256 or stronger."
            exit 1
          fi

      - name: Clean up runner disk
        if: always()
        run: |
          set +e
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R "$(id -u):$(id -g)" /ws 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -delete 2>/dev/null || true
          rm -rf /tmp/digests 2>/dev/null || true
          docker buildx prune -f --filter "until=1h" 2>/dev/null || true
          docker system prune -f --filter "until=1h" 2>/dev/null || true
          exit 0

  trivy-config:
    name: trivy (config / IaC)
    runs-on: self-hosted
    steps:
      - name: Reset workspace ownership
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R $(id -u):$(id -g) /ws 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Clean up runner disk
        if: always()
        run: |
          set +e
          docker run --rm -v "$GITHUB_WORKSPACE:/ws" alpine \
            chown -R "$(id -u):$(id -g)" /ws 2>/dev/null || true
          find "$GITHUB_WORKSPACE" -mindepth 1 -delete 2>/dev/null || true
          rm -rf /tmp/digests 2>/dev/null || true
          docker buildx prune -f --filter "until=1h" 2>/dev/null || true
          docker system prune -f --filter "until=1h" 2>/dev/null || true
          exit 0
