# CT-Ops Agent Configuration
# Copy this file to /etc/ct-ops/agent.toml and fill in your values.
# Environment variables (CT_OPS_ prefix) override these settings.

[ingest]
# Address of the CT-Ops ingest service (host:port)
address = "ct-ops.yourdomain.com:9443"

# Path to the server's CA certificate for TLS verification.
# Leave empty to use the system's default CA bundle.
# For dev/self-signed: set to the path of deploy/dev-tls/server.crt
ca_cert_file = ""

# Disable TLS certificate verification entirely. INSECURE — for development only.
# Do not use in production.
tls_skip_verify = false

[agent]
# Enrolment token from the CT-Ops UI (Administration → Agents → Enrolment)
# Can also be set via CT_OPS_ORG_TOKEN environment variable.
org_token = ""

# Directory where the agent stores its identity keypair and state.
# Must be writable by the user running the agent.
data_dir = "/var/lib/ct-ops/agent"

# How often to send a heartbeat to the ingest service (seconds)
heartbeat_interval_secs = 30
