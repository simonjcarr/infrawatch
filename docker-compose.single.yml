services:
  db:
    image: docker.io/timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: infrawatch
      POSTGRES_PASSWORD: infrawatch
      POSTGRES_DB: infrawatch
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrawatch -d infrawatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:-ghcr.io/carrtech-dev/infrawatch/web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://infrawatch:infrawatch@db:5432/infrawatch
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3000}
      NODE_ENV: production
      AGENT_DIST_DIR: /var/lib/infrawatch/agent-dist
      AGENT_DOWNLOAD_BASE_URL: ${AGENT_DOWNLOAD_BASE_URL:-http://localhost:3000}
      INGEST_WS_URL: ${INGEST_WS_URL:-ws://localhost:8080}
      INFRAWATCH_LOADTEST_ADMIN_KEY: ${INFRAWATCH_LOADTEST_ADMIN_KEY:-}
    volumes:
      - agent_dist:/var/lib/infrawatch/agent-dist

  ingest:
    image: ${INGEST_IMAGE:-ghcr.io/carrtech-dev/infrawatch/ingest:latest}
    build:
      context: .
      dockerfile: apps/ingest/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9443:9443"   # gRPC (TLS)
      - "8080:8080"   # JWKS + healthz HTTP
    environment:
      DATABASE_URL: postgresql://infrawatch:infrawatch@db:5432/infrawatch
      INGEST_TLS_CERT: /etc/infrawatch/tls/server.crt
      INGEST_TLS_KEY: /etc/infrawatch/tls/server.key
      INGEST_JWT_KEY_FILE: /var/lib/infrawatch/jwt_key.pem
      # Public base URL of the web app — agents construct their download URL
      # from this, so it must be reachable from the agent host (not just from
      # inside the docker network). Override via .env / start.sh for remote
      # agents; defaults to localhost for single-host dev.
      INGEST_AGENT_DOWNLOAD_BASE_URL: ${AGENT_DOWNLOAD_BASE_URL:-http://localhost:3000}
      # The release-please manifest is baked into the ingest image at build
      # time (see apps/ingest/Dockerfile) and INGEST_RELEASE_MANIFEST_PATH is
      # set there as well, so production users running from GHCR do not need
      # a source checkout for the agent version to be discovered.
    volumes:
      - ./deploy/dev-tls:/etc/infrawatch/tls:ro
      - ingest_data:/var/lib/infrawatch
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  ingest_data:
  agent_dist:
