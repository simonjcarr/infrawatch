syntax = "proto3";

package agent.v1;

import "agent/v1/terminal.proto";

option go_package = "github.com/carrtech-dev/ct-ops/proto/agent/v1;agentv1";

message DiskInfo {
  string mount_point  = 1;
  string device       = 2;
  string fs_type      = 3;
  uint64 total_bytes  = 4;
  uint64 used_bytes   = 5;
  uint64 free_bytes   = 6;
  float  percent_used = 7;
}

message NetworkInterface {
  string          name         = 1;
  repeated string ip_addresses = 2;
  string          mac_address  = 3;
  bool            is_up        = 4;
}

message CheckDefinition {
  string check_id        = 1;
  string check_type      = 2;  // "port" | "process" | "http"
  string config_json     = 3;  // JSON-encoded type-specific config
  int32  interval_seconds = 4;
}

message CheckResult {
  string check_id    = 1;
  string status      = 2;  // "pass" | "fail" | "error"
  string output      = 3;
  int32  duration_ms = 4;
  int64  ran_at_unix = 5;
}

// AgentQuery is pushed from the server to instruct the agent to run a one-shot
// enumeration query (e.g. list listening ports, list running services) and
// return the results on the next heartbeat.
message AgentQuery {
  string query_id   = 1;
  string query_type = 2;  // "list_ports" | "list_services"
}

// PortInfo describes a single listening TCP port discovered on the host.
message PortInfo {
  int32  port     = 1;
  string protocol = 2;  // "tcp"
  string process  = 3;
}

// ServiceInfo describes a single systemd service unit.
message ServiceInfo {
  string name        = 1;
  string load_state  = 2;
  string active_sub  = 3;
}

// AgentQueryResult is returned by the agent in a HeartbeatRequest after
// executing an AgentQuery pushed to it via a HeartbeatResponse.
message AgentQueryResult {
  string       query_id   = 1;
  string       query_type = 2;
  string       status     = 3;  // "ok" | "error"
  string       error      = 4;
  repeated PortInfo    ports    = 5;
  repeated ServiceInfo services = 6;
}

// AgentTask is pushed server→agent to execute a named task.
message AgentTask {
  string task_id     = 1;  // = task_run_hosts.id
  string task_type   = 2;  // "patch" | "custom_script" (extensible)
  string config_json = 3;  // JSON payload parsed by the task handler
}

// AgentTaskProgress is sent agent→server with incremental stdout/stderr
// while a task is still running (one or more per heartbeat during execution).
message AgentTaskProgress {
  string task_id      = 1;
  string output_chunk = 2;  // raw stdout/stderr since last progress message
}

// AgentTaskResult is sent agent→server exactly once, when a task completes.
message AgentTaskResult {
  string task_id     = 1;
  string task_type   = 2;
  int32  exit_code   = 3;
  string result_json = 4;  // structured outcome (task-type specific)
  string error       = 5;  // human-readable error if task failed to start
}

message HeartbeatRequest {
  string    agent_id      = 1;
  float     cpu_percent   = 2;
  float     memory_percent = 3;
  float     disk_percent  = 4;
  int64     uptime_seconds = 5;
  int64     timestamp_unix = 6;
  string    agent_version = 7;
  string    os_version    = 8;
  string    os            = 11;
  string    arch          = 12;
  repeated DiskInfo          disks              = 9;
  repeated NetworkInterface  network_interfaces = 10;
  repeated CheckResult       check_results      = 13;
  repeated AgentQueryResult  query_results      = 14;
  repeated AgentTaskProgress task_progress      = 15;
  repeated AgentTaskResult   task_results       = 16;
}

message HeartbeatResponse {
  bool ok = 1;
  string command = 2;         // server-push command type (empty = no command)
  bytes command_payload = 3;
  string latest_version = 4;  // latest known agent version
  bool update_available = 5;  // true when agent_version != latest_version
  string download_url = 6;    // base URL to fetch the updated binary from
  repeated CheckDefinition checks = 7;
  repeated AgentQuery pending_queries = 8;
  AgentTask pending_task = 9;          // current pending task (one at a time; absent = none)
  repeated string cancel_task_ids = 10; // task_run_hosts.id values the agent must cancel immediately
  repeated TerminalSessionRequest pending_terminal_sessions = 11; // terminal sessions to open
  repeated string cancel_terminal_sessions = 12;                  // terminal sessions to close
  // PEM-encoded client cert the server has just signed for this agent.
  // Populated when the server holds a newer cert than the agent reports.
  // The agent persists it atomically and re-dials gRPC with mTLS.
  string pending_client_cert_pem = 13;
  int64 pending_client_cert_not_after_unix = 14;
  // Agent CA cert bundle (PEM). Sent alongside a pending cert or when the CA
  // has rotated — the agent stashes this so it can display the chain.
  string agent_ca_cert_pem = 15;
}
