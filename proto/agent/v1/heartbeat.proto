syntax = "proto3";

package agent.v1;

option go_package = "github.com/infrawatch/proto/agent/v1;agentv1";

message DiskInfo {
  string mount_point  = 1;
  string device       = 2;
  string fs_type      = 3;
  uint64 total_bytes  = 4;
  uint64 used_bytes   = 5;
  uint64 free_bytes   = 6;
  float  percent_used = 7;
}

message NetworkInterface {
  string          name         = 1;
  repeated string ip_addresses = 2;
  string          mac_address  = 3;
  bool            is_up        = 4;
}

message CheckDefinition {
  string check_id        = 1;
  string check_type      = 2;  // "port" | "process" | "http"
  string config_json     = 3;  // JSON-encoded type-specific config
  int32  interval_seconds = 4;
}

message CheckResult {
  string check_id    = 1;
  string status      = 2;  // "pass" | "fail" | "error"
  string output      = 3;
  int32  duration_ms = 4;
  int64  ran_at_unix = 5;
}

message HeartbeatRequest {
  string    agent_id      = 1;
  float     cpu_percent   = 2;
  float     memory_percent = 3;
  float     disk_percent  = 4;
  int64     uptime_seconds = 5;
  int64     timestamp_unix = 6;
  string    agent_version = 7;
  string    os_version    = 8;
  string    os            = 11;
  string    arch          = 12;
  repeated DiskInfo          disks              = 9;
  repeated NetworkInterface  network_interfaces = 10;
  repeated CheckResult       check_results      = 13;
}

message HeartbeatResponse {
  bool ok = 1;
  string command = 2;         // server-push command type (empty = no command)
  bytes command_payload = 3;
  string latest_version = 4;  // latest known agent version
  bool update_available = 5;  // true when agent_version != latest_version
  string download_url = 6;    // base URL to fetch the updated binary from
  repeated CheckDefinition checks = 7;
}
