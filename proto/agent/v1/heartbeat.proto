syntax = "proto3";

package agent.v1;

option go_package = "github.com/infrawatch/proto/agent/v1;agentv1";

message HeartbeatRequest {
  string agent_id = 1;
  float cpu_percent = 2;
  float memory_percent = 3;
  float disk_percent = 4;
  int64 uptime_seconds = 5;
  int64 timestamp_unix = 6;
}

message HeartbeatResponse {
  bool ok = 1;
  string command = 2;         // server-push command type (empty = no command)
  bytes command_payload = 3;
}
