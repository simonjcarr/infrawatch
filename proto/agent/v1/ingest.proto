syntax = "proto3";

package agent.v1;

import "agent/v1/registration.proto";
import "agent/v1/heartbeat.proto";
import "agent/v1/terminal.proto";

option go_package = "github.com/carrtech-dev/ct-ops/proto/agent/v1;agentv1";

service IngestService {
  // Register an agent with the server. Idempotent — re-registering returns
  // the existing agent_id and current status.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat is a bidirectional stream. Agent sends metrics on interval;
  // server can push back commands (revocation, config reload, etc.).
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);

  // Terminal is a bidirectional stream for interactive PTY sessions.
  // Agent opens this stream after receiving a TerminalSessionRequest via
  // HeartbeatResponse. Data flows in real-time between the browser (via
  // WebSocket on the ingest HTTP server) and the agent's PTY.
  rpc Terminal(stream TerminalAgentMessage) returns (stream TerminalServerMessage);

  // SubmitSoftwareInventory is a client-streaming RPC. The agent opens a
  // stream, sends chunks of 500 packages each, and signals completion with
  // is_last=true. The server upserts packages and responds with a final ack.
  rpc SubmitSoftwareInventory(stream SoftwareInventoryChunk) returns (SoftwareInventoryAck);

  // RenewCertificate is called by an agent whose client cert is approaching
  // expiry. The agent sends a fresh CSR signed by the same Ed25519 identity
  // key. The server signs with the current agent CA and returns a new leaf.
  // Requires a valid JWT; the existing (still-valid) client cert also proves
  // wire identity during the handshake.
  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse);
}

message RenewCertificateRequest {
  string agent_id = 1;
  bytes csr_der = 2;
}

message RenewCertificateResponse {
  string client_cert_pem = 1;
  int64 client_cert_not_after_unix = 2;
  string agent_ca_cert_pem = 3;
}

// SoftwareInventoryChunk carries a batch of packages from a single scan.
message SoftwareInventoryChunk {
  string scan_id    = 1;  // task_run_hosts.id that triggered this scan
  string agent_id   = 2;
  string source     = 3;  // "rpm" | "dpkg" | "pacman" | "apk" | "winreg" | etc.
  int32  chunk_index = 4;
  bool   is_last    = 5;  // set true on the final chunk
  repeated SoftwarePackage packages = 6;
}

// SoftwarePackage is a single installed package entry.
message SoftwarePackage {
  string name         = 1;
  string version      = 2;
  string architecture = 3;
  string publisher    = 4;
  int64  install_date_unix = 5;  // Unix timestamp; 0 if unknown
}

// SoftwareInventoryAck is returned once the server has processed all chunks.
message SoftwareInventoryAck {
  int32 received = 1;  // total packages received across all chunks
}
